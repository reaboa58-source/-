<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Bot Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>🤖 Discord Bot Dashboard</h1>
            <div class="status-badge" id="statusBadge">
                <span class="dot" id="statusDot"></span>
                <span id="statusText">جاري التحقق...</span>
            </div>
        </header>

        <!-- Control Panel -->
        <section class="panel controls">
            <h2>⚡ لوحة التحكم</h2>
            <div class="buttons">
                <button id="startBtn" class="btn btn-start" onclick="startBot()">
                    ▶️ تشغيل البوت
                </button>
                <button id="stopBtn" class="btn btn-stop" onclick="stopBot()" disabled>
                    ⏹️ إيقاف البوت
                </button>
                <button class="btn btn-refresh" onclick="refreshStatus()">
                    🔄 تحديث
                </button>
            </div>
            
            <!-- Settings Panel -->
            <div class="settings-panel" style="margin-top: 20px; padding: 20px; background: var(--bg-card); border-radius: 12px;">
                <h3>🔐 إعدادات البوت</h3>
                
                <div class="input-group" style="margin: 15px 0;">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-secondary);">Discord Bot Token:</label>
                    <input type="password" id="botToken" placeholder="ضع التوكن هنا..." 
                           style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); 
                                  background: var(--bg-primary); color: var(--text-primary); font-family: monospace;">
                </div>
                
                <div class="input-group" style="margin: 15px 0;">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-secondary);">Client ID:</label>
                    <input type="text" id="clientId" placeholder="ضع الـ Client ID هنا..." 
                           style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); 
                                  background: var(--bg-primary); color: var(--text-primary);">
                </div>
                
                <button onclick="saveSettings()" class="btn btn-refresh" style="margin-top: 10px;">
                    💾 حفظ الإعدادات
                </button>
                
                <div id="saveStatus" style="margin-top: 10px; font-size: 0.9rem;"></div>
            </div>
        </section>

        <!-- Stats -->
        <section class="panel stats">
            <h2>📊 الإحصائيات</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">🏓</div>
                    <div class="stat-value" id="ping">-</div>
                    <div class="stat-label">Ping</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🏰</div>
                    <div class="stat-value" id="guilds">-</div>
                    <div class="stat-label">السيرفرات</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-value" id="users">-</div>
                    <div class="stat-label">المستخدمين</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⌨️</div>
                    <div class="stat-value" id="commands">-</div>
                    <div class="stat-label">الأوامر</div>
                </div>
            </div>
        </section>

        <!-- Bot Info -->
        <section class="panel info">
            <h2>ℹ️ معلومات البوت</h2>
            <div class="info-row">
                <span>الاسم:</span>
                <span id="botTag" class="value">-</span>
            </div>
            <div class="info-row">
                <span>البريفكس:</span>
                <span class="value">!</span>
            </div>
        </section>

        <!-- Commands -->
        <section class="panel commands">
            <h2>⌨️ الأوامر المتاحة</h2>
            <div class="commands-list" id="commandsList">
                <div class="loading">جاري التحميل...</div>
            </div>
        </section>

        <!-- Logs -->
        <section class="panel logs">
            <h2>📝 السجل</h2>
            <div class="log-container" id="logContainer">
                <div class="log-entry info">Dashboard جاهز. ادخل التوكن في الإعدادات ثم اضغط "تشغيل".</div>
            </div>
        </section>
    </div>

    <script>
        // ======== Variables ========
        let isBotRunning = false;

        // ======== Settings Functions ========

        // تحميل الإعدادات المحفوظة
        function loadSettings() {
            const savedToken = localStorage.getItem('discord_bot_token');
            const savedClientId = localStorage.getItem('discord_client_id');
            
            if (savedToken) {
                document.getElementById('botToken').value = savedToken;
            }
            if (savedClientId) {
                document.getElementById('clientId').value = savedClientId;
            }
        }

        // حفظ الإعدادات
        function saveSettings() {
            const token = document.getElementById('botToken').value.trim();
            const clientId = document.getElementById('clientId').value.trim();
            
            if (!token || !clientId) {
                document.getElementById('saveStatus').innerHTML = 
                    '<span style="color: var(--accent-danger);">❌ الرجاء ملء جميع الحقول</span>';
                return;
            }
            
            localStorage.setItem('discord_bot_token', token);
            localStorage.setItem('discord_client_id', clientId);
            
            document.getElementById('saveStatus').innerHTML = 
                '<span style="color: var(--accent-success);">✅ تم الحفظ! يمكنك تشغيل البوت الآن</span>';
            
            addLog('🔐 تم حفظ الإعدادات', 'success');
        }

        // ======== Bot Control Functions ========
        
        async function startBot() {
            const token = localStorage.getItem('discord_bot_token');
            
            if (!token) {
                addLog('❌ الرجاء إدخال التوكن أولاً في الإعدادات', 'error');
                document.getElementById('saveStatus').innerHTML = 
                    '<span style="color: var(--accent-danger);">❌ الرجاء إدخال التوكن أولاً</span>';
                return;
            }
            
            addLog('⏳ جاري تشغيل البوت...', 'warning');
            
            try {
                const response = await fetch('/api/start', { 
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ token: token })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    addLog(data.message, 'success');
                    isBotRunning = true;
                    updateButtons();
                    setTimeout(refreshStatus, 2000);
                } else {
                    addLog(data.message, 'error');
                }
            } catch (err) {
                addLog('❌ خطأ في الاتصال بالسيرفر', 'error');
            }
        }

        async function stopBot() {
            addLog('⏳ جاري إيقاف البوت...', 'warning');
            
            try {
                const response = await fetch('/api/stop', { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    addLog(data.message, 'success');
                    isBotRunning = false;
                    updateButtons();
                    refreshStatus();
                } else {
                    addLog(data.message, 'error');
                }
            } catch (err) {
                addLog('❌ خطأ في الاتصال', 'error');
            }
        }

        async function refreshStatus() {
            try {
                const [statusRes, commandsRes] = await Promise.all([
                    fetch('/api/status'),
                    fetch('/api/commands')
                ]);
                
                const status = await statusRes.json();
                const commands = await commandsRes.json();
                
                updateUI(status, commands);
            } catch (err) {
                addLog('❌ فشل تحديث الحالة', 'error');
            }
        }

        function updateUI(status, commands) {
            isBotRunning = status.isRunning;
            
            // Status Badge
            const badge = document.getElementById('statusBadge');
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            if (status.isRunning) {
                badge.className = 'status-badge online';
                dot.className = 'dot online';
                text.textContent = '✅ شغال';
            } else {
                badge.className = 'status-badge offline';
                dot.className = 'dot offline';
                text.textContent = '❌ متوقف';
            }
            
            // Stats
            document.getElementById('ping').textContent = status.ping ? status.ping + 'ms' : '-';
            document.getElementById('guilds').textContent = status.guilds || '-';
            document.getElementById('users').textContent = status.users || '-';
            document.getElementById('commands').textContent = status.commands || '-';
            document.getElementById('botTag').textContent = status.tag || 'غير متصل';
            
            // Commands List
            const list = document.getElementById('commandsList');
            if (commands.length > 0) {
                list.innerHTML = commands.map(cmd => `
                    <div class="command-item">
                        <div class="cmd-header">
                            <span class="cmd-name">!${cmd.name}</span>
                            <span class="cmd-category">${cmd.category}</span>
                        </div>
                        <div class="cmd-desc">${cmd.description}</div>
                        <div class="cmd-usage">الاستخدام: <code>${cmd.usage}</code></div>
                    </div>
                `).join('');
            } else {
                list.innerHTML = '<div class="loading">لا توجد أوامر محملة</div>';
            }
            
            updateButtons();
        }

        function updateButtons() {
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            
            startBtn.disabled = isBotRunning;
            stopBtn.disabled = !isBotRunning;
        }

        function addLog(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            
            const time = new Date().toLocaleTimeString('ar-SA');
            entry.textContent = `[${time}] ${message}`;
            
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        // ======== Init ========
        loadSettings(); // تحميل الإعدادات عند فتح الصفحة
        refreshStatus();
        setInterval(refreshStatus, 10000); // تحديث كل 10 ثواني
    </script>
</body>
</html>
