<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Bot Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1> Discord Bot Dashboard</h1>
            <div class="status-badge" id="statusBadge">
                <span class="dot" id="statusDot"></span>
                <span id="statusText">جاري التحقق...</span>
            </div>
        </header>

        <section class="panel controls">
            <h2> لوحة التحكم</h2>
            <div class="buttons">
                <button id="startBtn" class="btn btn-start" onclick="startBot()">▶️ تشغيل</button>
                <button id="stopBtn" class="btn btn-stop" onclick="stopBot()" disabled>⏹️ إيقاف</button>
                <button class="btn btn-refresh" onclick="refreshStatus()">🔄 تحديث</button>
            </div>
            
            <div class="settings-panel" style="margin-top: 20px; padding: 20px; background: var(--bg-card); border-radius: 12px;">
                <h3> توكن البوت</h3>
                <input type="password" id="botToken" placeholder="ضع التوكن هنا..." 
                       style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); 
                              background: var(--bg-primary); color: var(--text-primary); font-family: monospace; margin: 10px 0;">
                <button onclick="saveToken()" class="btn btn-refresh">حفظ</button>
                <div id="saveStatus" style="margin-top: 10px;"></div>
            </div>
        </section>

        <section class="panel stats">
            <h2> الإحصائيات</h2>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-icon">🏓</div><div class="stat-value" id="ping">-</div><div class="stat-label">Ping</div></div>
                <div class="stat-card"><div class="stat-icon">🏰</div><div class="stat-value" id="guilds">-</div><div class="stat-label">السيرفرات</div></div>
                <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-value" id="users">-</div><div class="stat-label">المستخدمين</div></div>
                <div class="stat-card"><div class="stat-icon">⌨️</div><div class="stat-value" id="commands">-</div><div class="stat-label">الأوامر</div></div>
            </div>
        </section>

        <section class="panel commands">
            <h2> الأوامر</h2>
            <div class="commands-list" id="commandsList"><div class="loading">جاري التحميل...</div></div>
        </section>

        <section class="panel logs">
            <h2> السجل</h2>
            <div class="log-container" id="logContainer"><div class="log-entry info">ادخل التوكن واضغط تشغيل</div></div>
        </section>
    </div>

    <script>
        let isBotRunning = false;

        function loadToken() {
            const saved = localStorage.getItem('discord_bot_token');
            if (saved) document.getElementById('botToken').value = saved;
        }

        function saveToken() {
            const token = document.getElementById('botToken').value.trim();
            if (!token) {
                document.getElementById('saveStatus').innerHTML = '<span style="color: var(--accent-danger);"> ادخل التوكن</span>';
                return;
            }
            localStorage.setItem('discord_bot_token', token);
            document.getElementById('saveStatus').innerHTML = '<span style="color: var(--accent-success);">تم الحفظ</span>';
            addLog(' تم حفظ التوكن', 'success');
        }

        async function startBot() {
            const token = localStorage.getItem('discord_bot_token');
            if (!token) {
                addLog(' ادخل التوكن أولاً', 'error');
                return;
            }
            addLog(' جاري التشغيل...', 'warning');
            try {
                const res = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                const data = await res.json();
                if (data.success) {
                    addLog('✅ ' + data.message, 'success');
                    isBotRunning = true;
                    updateButtons();
                    setTimeout(refreshStatus, 2000);
                } else {
                    addLog('❌ ' + data.message, 'error');
                }
            } catch (err) {
                addLog('❌ خطأ في الاتصال', 'error');
            }
        }

        async function stopBot() {
            addLog('⏳ جاري الإيقاف...', 'warning');
            try {
                const res = await fetch('/api/stop', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    addLog('✅ ' + data.message, 'success');
                    isBotRunning = false;
                    updateButtons();
                    refreshStatus();
                }
            } catch (err) {
                addLog('❌ خطأ', 'error');
            }
        }

        async function refreshStatus() {
            try {
                const [statusRes, cmdRes] = await Promise.all([fetch('/api/status'), fetch('/api/commands')]);
                const status = await statusRes.json();
                const commands = await cmdRes.json();
                updateUI(status, commands);
            } catch (err) {
                addLog('❌ فشل التحديث', 'error');
            }
        }

        function updateUI(status, commands) {
            isBotRunning = status.isRunning;
            const badge = document.getElementById('statusBadge');
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            if (status.isRunning) {
                badge.className = 'status-badge online';
                dot.className = 'dot online';
                text.textContent = '✅ شغال';
            } else {
                badge.className = 'status-badge offline';
                dot.className = 'dot offline';
                text.textContent = '❌ متوقف';
            }
            
            document.getElementById('ping').textContent = status.ping ? status.ping + 'ms' : '-';
            document.getElementById('guilds').textContent = status.guilds || '-';
            document.getElementById('users').textContent = status.users || '-';
            document.getElementById('commands').textContent = status.commands || '-';
            
            const list = document.getElementById('commandsList');
            if (commands.length > 0) {
                list.innerHTML = commands.map(cmd => `
                    <div class="command-item">
                        <div class="cmd-header">
                            <span class="cmd-name">!${cmd.name}</span>
                            <span class="cmd-category">${cmd.category}</span>
                        </div>
                        <div class="cmd-desc">${cmd.description}</div>
                        <div class="cmd-usage">استخدام: <code>${cmd.usage || '!' + cmd.name}</code></div>
                    </div>
                `).join('');
            }
            
            updateButtons();
        }

        function updateButtons() {
            document.getElementById('startBtn').disabled = isBotRunning;
            document.getElementById('stopBtn').disabled = !isBotRunning;
        }

        function addLog(msg, type = 'info') {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString('ar-SA')}] ${msg}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        loadToken();
        refreshStatus();
        setInterval(refreshStatus, 10000);
    </script>
</body>
</html>
